<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kisan-Vyapar</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<button id="themeToggle" class="theme-toggle-btn position-absolute top-0 end-0 m-4 shadow" title="Toggle Dark Mode">
    <i class="fas fa-moon"></i>
</button>

<div class="card login-card fade-in">
    <div class="text-center mb-4">
        <div class="bg-primary text-white d-inline-block rounded-circle p-3 mb-3 shadow-sm">
            <i class="fas fa-leaf fa-2x"></i>
        </div>
        <h3 class="text-primary fw-bold mb-1">Kisan-Vyapar</h3>
        <p class="text-muted">Sign in to your account</p>
    </div>

    <form action="index.html">
        <div class="mb-3">
            <label for="email" class="form-label text-muted fw-medium">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="admin@kisanvyapar.com" required>
            </div>
        </div>
        
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="password" class="form-label text-muted fw-medium mb-0">Password</label>
                <a href="#" class="text-primary text-decoration-none fs-7">Forgot Password?</a>
            </div>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0 ps-0 pe-0" id="password" placeholder="••••••••" required>
                <span class="input-group-text bg-transparent border-start-0 cursor-pointer" onclick="togglePassword()">
                    <i class="fas fa-eye text-muted" id="toggleIcon"></i>
                </span>
            </div>
        </div>

        <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label text-muted fs-7" for="rememberMe">Remember me on this device</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-6 shadow-sm">Sign In <i class="fas fa-arrow-right ms-1"></i></button>
    </form>

    <div class="mt-4 text-center">
        <p class="fs-7 text-muted">Protected by industry-standard encryption.</p>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="main.js"></script>
<div id="toastWrapper" class="toast-container"></div>
</body>
</html>
